name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorie_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: testing
      PROJECT_NAME: CalorieTracker
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calorie_tracker_test
      SECRET_KEY: ci-secret-key-not-for-production
      GOOGLE_CLIENT_ID: dummy
      GEMINI_API_KEY: dummy
      FOOD_OFF_USER_AGENT: "CalorieTracker/1.0 (ci@example.com)"
      FOOD_OFF_TIMEOUT_SEC: "15"
      # Ignore [tool.uv.sources] for all uv commands — skips the local Windows
      # wheel for llama-cpp-python and the CUDA pytorch index; both use PyPI instead
      UV_NO_SOURCES: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Lint with ruff
        working-directory: backend
        run: uvx ruff check src/ tests/

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Run unit tests
        working-directory: backend
        run: uv run pytest tests/unit/ -x -q --tb=short

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Lint
        working-directory: app
        run: npm run lint

      - name: Run tests
        working-directory: app
        run: npm test -- --ci --passWithNoTests
